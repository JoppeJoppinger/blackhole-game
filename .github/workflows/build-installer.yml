name: Build Windows Installer

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-installer:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set PowerShell execution policy
        shell: pwsh
        run: Set-ExecutionPolicy -ExecutionPolicy Bypass -Scope Process -Force

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Install WiX Toolset v4
        shell: pwsh
        run: |
          dotnet tool install --global wix
          wix extension add WixToolset.Bal.wixext
          wix extension add WixToolset.UI.wixext
          wix extension add WixToolset.Util.wixext

      - name: Create placeholder resources
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path Installer\Resources | Out-Null

          # Minimal valid 1x1 ICO (placeholder — replace with real icon before release)
          $icoBytes = [Convert]::FromBase64String(
            "AAABAAEAAQEAAAEAIAAoAAAAFgAAACgAAAABAAAAAgAAAAEAIAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA" +
            "AAAAAAAAAAAAAA=="
          )
          [IO.File]::WriteAllBytes("$PWD\Installer\Resources\icon.ico", $icoBytes)

          # Minimal 480x70 white PNG (placeholder logo)
          # Using a tiny valid PNG (1x1 white pixel — WiX will accept it, replace before release)
          $pngBytes = [Convert]::FromBase64String(
            "iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mP8z8BQDwADhQGAWjR9awAAAABJRU5ErkJggg=="
          )
          [IO.File]::WriteAllBytes("$PWD\Installer\Resources\logo.png", $pngBytes)

          # Minimal BMP placeholders for MSI dialogs
          $bmpBytes = [Convert]::FromBase64String(
            "Qk02AAAAAAAAADYAAAAoAAAABAAAAAQAAAABABgAAAAAAAAAAADEDgAAxA4AAAAAAAAAAAAA/////wAA" +
            "AP8AAAAAAAAAAP////8AAAAA"
          )
          [IO.File]::WriteAllBytes("$PWD\Installer\Resources\banner.bmp", $bmpBytes)
          [IO.File]::WriteAllBytes("$PWD\Installer\Resources\dialog.bmp", $bmpBytes)

          Write-Host "Resources created."

      - name: Build MSI
        shell: pwsh
        working-directory: Installer
        run: |
          New-Item -ItemType Directory -Force -Path Output | Out-Null

          wix build `
            Product\Product.wxs `
            Product\Directories.wxs `
            Product\Features.wxs `
            Product\Shortcuts.wxs `
            Product\RegistryEntries.wxs `
            Product\EnvironmentVariables.wxs `
            UI\CustomUI.wxs `
            -ext WixToolset.UI.wixext `
            -ext WixToolset.Util.wixext `
            -d SourceDir=".." `
            -o Output\BlackHoleGame-1.0.0.msi

          Write-Host "MSI built successfully."

      - name: Build Bundle (Setup.exe)
        shell: pwsh
        working-directory: Installer
        run: |
          wix build `
            Bundle\Bundle.wxs `
            Prerequisites\Git.wxs `
            Prerequisites\VCRedist.wxs `
            -ext WixToolset.Bal.wixext `
            -ext WixToolset.Util.wixext `
            -d MsiPath="Output\BlackHoleGame-1.0.0.msi" `
            -o Output\BlackHoleGame-1.0.0-Setup.exe

          Write-Host "Bundle (Setup.exe) built successfully."

      - name: Compute checksums
        shell: pwsh
        working-directory: Installer\Output
        run: |
          Get-ChildItem *.msi, *.exe | ForEach-Object {
            $hash = (Get-FileHash $_.Name -Algorithm SHA256).Hash
            $size = "{0:N2} MB" -f ($_.Length / 1MB)
            Write-Host "$($_.Name)  [$size]  SHA256: $hash"
            "$hash  $($_.Name)" | Out-File -Append checksums.txt
          }

      - name: Upload artifacts (every build)
        uses: actions/upload-artifact@v4
        with:
          name: BlackHoleGame-Installer
          path: |
            Installer/Output/BlackHoleGame-1.0.0-Setup.exe
            Installer/Output/BlackHoleGame-1.0.0.msi
            Installer/Output/checksums.txt
          retention-days: 30

      - name: Create GitHub Release (on tag push)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: "Black Hole Game ${{ github.ref_name }}"
          body: |
            ## Black Hole Game — Windows Installer

            ### Installation
            1. Download `BlackHoleGame-Setup.exe`
            2. Doppelklick → folge dem Assistenten
            3. Alle Voraussetzungen werden automatisch installiert

            ### Silent Install
            ```
            BlackHoleGame-1.0.0-Setup.exe /quiet /norestart
            ```

            ### Voraussetzungen (werden automatisch installiert)
            - Git for Windows
            - Visual C++ 2022 Redistributable
            - Visual Studio 2022 Build Tools (C++ Game workload)

            > **Hinweis:** Unreal Engine 5.3 muss separat über den Epic Games Launcher installiert werden (~30 GB).

            ### Checksums
            Siehe `checksums.txt` im Release.
          files: |
            Installer/Output/BlackHoleGame-1.0.0-Setup.exe
            Installer/Output/BlackHoleGame-1.0.0.msi
            Installer/Output/checksums.txt
          draft: false
          prerelease: false
