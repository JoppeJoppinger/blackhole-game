[/Script/Engine.RendererSettings]
; ─── Ray Tracing ──────────────────────────────────────────────────────────────
; Ray tracing is OPTIONAL — enabled by default but GraphicsQualityManager
; will disable it at runtime for AMD/non-RTX GPUs.
; This just allows the DX12 RHI to expose the feature if available.
r.RayTracing=1
r.RayTracing.EnableInEditor=1

; ─── Lumen Global Illumination ───────────────────────────────────────────────
; Software RT path is the default so AMD RDNA2 works out of the box.
; GraphicsQualityManager upgrades to HW-RT for NVIDIA RTX at runtime.
r.Lumen.Reflections.Allow=1
r.Lumen.GI.Allow=1
r.Lumen.HardwareRayTracing=0
r.Lumen.Reflections.UseSoftwareRayTracing=1
r.Lumen.GI.UseSoftwareRayTracing=1

; ─── Nanite Virtualised Geometry ─────────────────────────────────────────────
r.Nanite=1
r.Nanite.MaxPixelsPerEdge=1.0

; ─── Virtual Shadow Maps ─────────────────────────────────────────────────────
r.Shadow.Virtual.Enable=1

; ─── Post-Process Quality ────────────────────────────────────────────────────
r.MotionBlurQuality=3
r.BloomQuality=4
r.DepthOfFieldQuality=3
r.AmbientOcclusionLevels=3
r.ScreenPercentage=100

; ─── Anti-Aliasing: TSR by default (works on DX12 without HW-RT) ─────────────
r.AntiAliasingMethod=4

; ─── HDR ─────────────────────────────────────────────────────────────────────
r.HDR.EnableHDROutput=0
r.HDR.Display.ColorGamut=2
r.HDR.Display.OutputDevice=3

; ─── Texture Streaming ────────────────────────────────────────────────────────
r.Streaming.PoolSize=2048
r.Streaming.MaxTempMemoryAllowed=256

; ─── Temporal Super Resolution ────────────────────────────────────────────────
r.TSR.History.ScreenPercentage=200

; ─── Misc Performance ─────────────────────────────────────────────────────────
r.HalfResReflections=0
r.SSR.Quality=4
r.SSAO.Downsample=0

[/Script/Engine.Engine]
bSmoothFrameRate=True
SmoothedFrameRateRange=(LowerBound=(Type=Inclusive,Value=22.000000),UpperBound=(Type=Exclusive,Value=120.000000))
bUseFixedFrameRate=False

[/Script/WindowsTargetPlatform.WindowsTargetSettings]
; Allow both DX12 (preferred) and DX11 (fallback for older AMD)
DefaultGraphicsRHI=DefaultGraphicsRHI_DX12
D3D12TargetedShaderFormats=PCD3D_SM6
D3D11TargetedShaderFormats=PCD3D_SM5

; ─── Linux / Vulkan ──────────────────────────────────────────────────────────
[/Script/LinuxTargetPlatform.LinuxTargetSettings]
TargetedRHIs=SF_VULKAN_SM5
TargetedRHIs=SF_VULKAN_SM6

[/Script/Engine.RendererOverrideSettings]
; Allow fallback to SM5 / DX11 on hardware that doesn't support SM6 / DX12 RT
bAllowFallbackShaderFormats=True
